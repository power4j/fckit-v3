# phone: built-in regex detector + maskMiddle transformer
rule.phone.detector=regex
rule.phone.transformer=maskMiddle
rule.phone.pattern=1[3-9]\\d{9}
rule.phone.keepFirst=3
rule.phone.keepLast=4
rule.phone.order=0

# id card: custom idCard detector + idCardMask transformer
rule.idcard.detector=idCard
rule.idcard.transformer=idCardMask
rule.idcard.order=1
